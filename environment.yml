name: gvgai_jpype
channels:
  - conda-forge
  - defaults

dependencies:
  # ------------------------------------------------------------------ #
  # Runtime
  # ------------------------------------------------------------------ #
  - python=3.11
  - openjdk=17            # JDK 17 LTS — required by JPype and GVGAI build

  # Core numerical / image stack
  - numpy>=1.24
  - pillow>=10.0
  - matplotlib>=3.7

  # Gym (use 0.26 which supports Python 3.11; API matches 0.22 for our use)
  - pip

  - pip:
    # ---------------------------------------------------------------- #
    # Gym / RL  (gymnasium replaces legacy gym; Python 3.11 compatible)
    # ---------------------------------------------------------------- #
    - gymnasium>=1.0.0
    - pygame>=2.6.0

    # ---------------------------------------------------------------- #
    # JPype — Java-Python bridge (replaces subprocess+socket)
    # ---------------------------------------------------------------- #
    - JPype1>=1.5.0

    # ---------------------------------------------------------------- #
    # LLM providers
    # ---------------------------------------------------------------- #
    - openai>=1.40.0
    - anthropic>=0.30.0        # Claude API
    - google-generativeai>=0.7.0  # Gemini API
    - requests>=2.31.0
    - httpx>=0.27.0
    - aiohttp>=3.9.0

    # ---------------------------------------------------------------- #
    # Tokenisation / prompt utilities
    # ---------------------------------------------------------------- #
    - tiktoken>=0.7.0

    # ---------------------------------------------------------------- #
    # Config / environment
    # ---------------------------------------------------------------- #
    - python-dotenv>=1.0.0
    - pydantic>=2.5.0

    # ---------------------------------------------------------------- #
    # Media / visualisation
    # ---------------------------------------------------------------- #
    - imageio>=2.34.0
    - tqdm>=4.66.0

    # ---------------------------------------------------------------- #
    # Data / analysis
    # ---------------------------------------------------------------- #
    - pandas>=2.1.0

    # ---------------------------------------------------------------- #
    # Misc
    # ---------------------------------------------------------------- #
    - flask>=3.0.0

    # ---------------------------------------------------------------- #
    # Local package (gym_gvgai); also compiles Java via setup.py
    # ---------------------------------------------------------------- #
    - -e ..
